# Cloudflare Worker that proxies the iOS app's Anthropic API calls.
#
# Setup (run from this directory):
#   1. wrangler login
#   2. wrangler kv namespace create DEVICES         # copy the id
#   3. wrangler kv namespace create CHALLENGES      # copy the id
#   4. wrangler kv namespace create RATE_LIMITS     # copy the id
#      Paste the three ids into the [[kv_namespaces]] entries below.
#   5. wrangler secret put ANTHROPIC_API_KEY        # paste the rotated key
#   6. Set APPLE_APP_ID below to "<TEAMID>.<bundle.id>" — find TEAMID at
#      developer.apple.com/account → Membership Details, bundle id matches
#      Xcode's Signing & Capabilities pane.
#   7. wrangler deploy

name = "calorie-calc-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# Set this to "<TEAM_ID>.<BUNDLE_ID>" — used to verify App Attest attestations
# come from this app and not some other one signed with stolen credentials.
[vars]
APPLE_APP_ID = "X8629DMYVG.com.lawlerinnovationsinc-calorie"
# Per-device daily request quota. Abuse ceiling, not the paywall — sized so a
# compromised App Attest key can only run up ~$30/mo of Anthropic cost.
DAILY_REQUEST_LIMIT = "50"
# When true, accept the App Attest "appattestdevelop" AAGUID. Flip to false
# before App Store submission so dev-environment attestations are rejected.
ALLOW_DEV_ATTESTATION = "true"
# Credits granted per AdMob rewarded-video completion (verified via SSV in Phase 3).
CREDITS_PER_AD = "5"
# One-time grant fired on a device's first /v1/messages or /v1/account/state call
# after this version of the worker shipped. Doubles as the new-user free trial and
# the grandfather allotment for pre-existing TestFlight devices. Debug iOS builds
# override this to 1 via the X-Debug-Build header — see initialCreditsFor in index.ts.
INITIAL_FREE_CREDITS = "50"
# StoreKit 2 product id for the monthly subscription. Must match the product
# configured in App Store Connect exactly.
SUBSCRIPTION_PRODUCT_ID = "com.lawlerinnovationsinc_calorie.ai.monthly"
# Used to verify the `bundleId` claim in JWS receipts coming back from StoreKit.
APPSTORE_BUNDLE_ID = "com.lawlerinnovationsinc-calorie"
# Sandbox while testing TestFlight purchases; flip to "Production" before
# App Store submission so forged sandbox notifications can't grant prod entitlements.
APPSTORE_ENVIRONMENT = "Sandbox"

[[kv_namespaces]]
binding = "DEVICES"
id = "5a6501f17e33481d92ae7a5a99edda58"

[[kv_namespaces]]
binding = "CHALLENGES"
id = "cdb1656295a74c0a9c421bd931002b92"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "d46f3bb76bf342bcb283844b60bbb606"

[observability]
enabled = true
